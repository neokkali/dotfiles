# 1. 🎨 ضبط الألوان والأطراف
set -g default-terminal 'screen-256color'
set -as terminal-features ',xterm-256color:RGB' 

unbind C-b
set -g prefix C-Space
bind Space send-prefix  

unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

set -g mouse on

bind -r n next-window 
bind -r p previous-window


bind-key q kill-pane
bind-key o new-window
bind | split-window -h 
bind - split-window -v 

# Copy Text without "y"
set-window-option -g mode-keys vi
set -g repeat-time 300
set -g base-index 1
set -g renumber-windows on
set -s escape-time 0

bind -n C-n next-window
bind -n C-p previous-window


vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l


set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"

# Style
gray_light="#D8DEE9"
gray_medium="#ABB2BF"
gray_dark="#3B4252"
green_soft="#A3BE8C"
blue_muted="#81A1C1"
cyan_soft="#88C0D0"

set -g status-position top       
set -g status-left-length 100
set -g status-style "fg=${gray_light},bg=default"
set -g status-style "fg=${gray_light},bg=default"
set -g status-right ""
set -g status-left "#[fg=${green_soft},bold]󰇈 #S #[fg=${gray_light},nobold] | "
set -g window-status-current-format "#[fg=${cyan_soft},bold] #[underscore]#I:#W"
set -g window-status-format "#I:#W"
set -g message-style "fg=${gray_light},bg=default"
set -g mode-style "fg=${gray_light},bg=${blue_muted}"
set -g pane-border-style "fg=${gray_dark}"
set -g pane-active-border-style "fg=${gray_medium}"



run "~/.config/tmux/plugins/tpm/tpm"
